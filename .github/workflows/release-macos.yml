name: Release macOS DMG

# Manual release pipeline. You trigger it from the Actions tab and type the version
# tag to cut — the workflow creates that tag, builds a universal (Apple Silicon +
# Intel) .dmg, generates user-facing release notes, and publishes a GitHub Release
# with the .dmg attached. See the README → "Test on a second Mac over your LAN".
#
# Required once, in Settings → Secrets and variables → Actions:
#   • Secret   SDK_TOKEN — a token with read access to the private chain-SDK repo.
#   • Variable SDK_REPO — the SDK repo's owner/name; optional SDK_REF (branch/tag).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create and release (e.g. v0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as a pre-release"
        type: boolean
        default: true

permissions:
  contents: write # create the tag + release

jobs:
  release:
    runs-on: macos-14 # Apple Silicon runner; cross-compiles the Intel slice too.
    timeout-minutes: 90
    steps:
      - name: Check out the app (full history, for the changelog)
        uses: actions/checkout@v4
        with:
          path: unstation-desktop
          fetch-depth: 0

      # The app builds against a chain SDK by relative path; check it out as the
      # expected sibling directory so cargo resolves it. Set the SDK_REPO variable
      # to that repo's owner/name.
      - name: Check out the chain SDK
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SDK_REPO }}
          ref: ${{ vars.SDK_REF || 'main' }}
          # Falls back to the built-in token so the step never fails with
          # "token not supplied". A private SDK repo still needs SDK_TOKEN (a token
          # with read access) — the built-in token can't reach other repos.
          token: ${{ secrets.SDK_TOKEN || github.token }}
          path: useragent-kit

      - name: Install Rust (stable + universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: unstation-desktop/desktop/src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: unstation-desktop/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: unstation-desktop/desktop
        run: pnpm install --frozen-lockfile

      - name: Build the universal macOS DMG
        working-directory: unstation-desktop/desktop
        # `tauri build` runs the frontend build (beforeBuildCommand) and bundles an
        # unsigned .app + .dmg. Unsigned is fine for self-testing; the release notes
        # include the one-time Gatekeeper bypass for the other Mac.
        run: pnpm tauri build --target universal-apple-darwin

      - name: Locate the DMG
        id: dmg
        run: |
          DMG=$(find unstation-desktop/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then echo "no .dmg produced"; exit 1; fi
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - name: Upload the DMG as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unstation-${{ inputs.version }}-macOS-universal
          path: ${{ steps.dmg.outputs.path }}
          if-no-files-found: error

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: unstation-desktop/cliff.toml
          args: --workdir unstation-desktop --tag ${{ inputs.version }} --unreleased
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create the tag + release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          prerelease: ${{ inputs.prerelease }}
          files: ${{ steps.dmg.outputs.path }}
          fail_on_unmatched_files: true
