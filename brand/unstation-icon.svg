<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Unstation">
  <title>Unstation app icon</title>
  <defs>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF5C7A"/>
      <stop offset="1" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- warm sunset tile: the "play-dot" from the wordmark, scaled up -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#signal)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#sheen)"/>
  <!-- play triangle in the ground colour, optically centred -->
  <polygon points="410,322 726,512 410,702" fill="#120C10"/>
</svg>
